name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy pydantic pydantic-settings fastapi
      - run: ruff check src/ tests/ --select E,F,I --ignore E501,E402,F401,F841 || true
      - run: mypy src/ --ignore-missing-imports || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pip install fastapi uvicorn pydantic pydantic-settings sqlalchemy asyncpg redis celery
      - name: Run unit tests
        run: pytest tests/unit -v --cov=src --cov-report=xml || true
      - uses: codecov/codecov-action@v4
        continue-on-error: true
